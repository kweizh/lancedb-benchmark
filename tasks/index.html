xt Search with LanceDB\n\n## Background\nYou are building a small keyword search prototype on top of LanceDB. The corpus is a collection of short articles about vector search, columnar formats, and information retrieval. You must use LanceDB's native (Lance-based) full-text search implementation — not the legacy Tantivy backend — to index the `body` column and run two BM25 queries.\n\n## Requirements\n- Connect to LanceDB at the path provided by the `LANCEDB_URI` environment variable (default `/workspace/db`).\n- Create (or recreate) a table named `articles` with this exact column layout:\n  - `id` — `int64`\n  - `title` — `string`\n  - `body` — `string`\n  - `vector` — `fixed_size_list\u003cfloat32\u003e[4]` (the values must come from `numpy.random.default_rng(1)`; the vector column is present for schema completeness but is not used by FTS).\n- Seed the table with at least 20 rows of varied article content. Each row's `body` should be distinct enough that the two FTS queries below resolve to a single unambiguous top result.\n- Build a native FTS index on the `body` column using the Lance-native backend (i.e. `use_tantivy=False`). The index must be (re)created idempotently each run.\n- Run two full-text queries (`query_type=\"fts\"`) using the values from the environment variables `FTS_QUERY_1` (default `\"vector database\"`) and `FTS_QUERY_2` (default `\"lance format\"`). For each query, capture the top 3 results.\n- Write the combined results to `/workspace/output/fts_results.json`.\n\n## Implementation Hints\n- Use the synchronous Python client: `import lancedb` and `lancedb.connect(uri)`.\n- Build the table schema with `pyarrow` (e.g. `pa.schema([...])`) so the vector column is `pa.list_(pa.float32(), 4)`.\n- Use `table.create_fts_index(\"body\", use_tantivy=False, replace=True)` to build the native FTS index.\n- Query with `table.search(query, query_type=\"fts\").limit(3).to_list()`; each result dict will include the matched row plus a `_score` field.\n- Make sure `/workspace/output/` exists before writing the JSON file.\n\n## Acceptance Criteria\n- Project path: /workspace\n- Ensure the script is executed end-to-end and the artifacts exist.\n- LanceDB table: `articles` at `${LANCEDB_URI}` (default `/workspace/db`).\n- The `articles` table schema must contain columns `id` (int64), `title` (string), `body` (string), and `vector` (fixed-size list of 4 float32 values), with at least 20 rows.\n- A native (non-Tantivy) FTS index must exist on the `body` column. It must be discoverable via `table.list_indices()`.\n- Output file: `/workspace/output/fts_results.json`. The file must be valid JSON whose top-level object contains exactly the keys `\"query_1\"` and `\"query_2\"`. Each value must be a list of up to 3 result objects, ordered by descending relevance, each with at least the keys `id` (int), `title` (string), and `_score` (number).\n- For each query, the result with the highest `_score` (the first entry) must correspond to the seeded row whose `body` is the canonical answer for that query (see `truth`).\n\n"])</script><script>self.__next_f.push([1,"a:Tda3,"])</script><script>self.__next_f.push([1,"# LanceDB: Update Rows with Special Characters\n\n## Background\nLanceDB tables expose two flavors of in-place updates: `table.update(where=..., values={...})` accepts plain Python values, while `table.update(where=..., values_sql={...})` accepts SQL expressions. When the new string value contains an apostrophe (e.g., `I'm good`, `It's a test`, `O'Brien`), naive use of `values_sql` produces an `Unterminated string literal` SQL error (LanceDB issue #1429). The Python `values=` form sidesteps this footgun entirely because the value is bound, not interpolated, into SQL.\n\nYour job is to write a Python script that creates a small `notes` table, seeds it with 8 rows, performs three updates that each set a column to a string containing a single quote, and writes the post-update state out to disk for verification.\n\n## Requirements\n- Connect to LanceDB at the path provided by the `LANCEDB_URI` env var (default `/workspace/db`).\n- Create a table named `notes` with columns:\n  - `id: int64`\n  - `author: string`\n  - `body: string`\n  - `vector: fixed_size_list\u003cfloat32\u003e[4]`\n- Seed the table with exactly 8 rows whose `id` values are 1..8, populated with simple ASCII `author` and `body` strings and deterministic 4-d float32 vectors.\n- Perform the following updates IN ORDER using `table.update(where=..., values={...})` (the Python dict form, NOT `values_sql`):\n  1. Set the `body` of the row where `id = 2` to the string `I'm good`.\n  2. Set the `body` of the row where `id = 4` to the string `It's a test`.\n  3. Set the `author` of the row where `id = 6` to the string `O'Brien`.\n- After all updates, read the rows with `id` in 1..8, sort them by `id` ascending, and write them to `/workspace/output/notes_after.json` as a JSON array of objects with keys `id`, `author`, `body` (no vector).\n\n## Implementation Hints\n- Use `lancedb.connect(os.environ.get(\"LANCEDB_URI\", \"/workspace/db\"))`.\n- Define the schema with `pyarrow` (`pa.schema([...])`) and `pa.list_(pa.float32(), 4)` for the vector column, then call `db.create_table(\"notes\", data=..., schema=..., mode=\"overwrite\")`.\n- Generate deterministic vectors with `numpy.random.default_rng(seed=...)`.\n- For each update, pass a Python dict to `values=`, e.g. `tbl.update(where=\"id = 2\", values={\"body\": \"I'm good\"})`. Do **not** use `values_sql` — it requires SQL string escaping and is the cause of the apostrophe bug.\n- For the final read, you can use `tbl.search().where(\"id \u003e= 1 AND id \u003c= 8\").limit(100).to_list()` or `tbl.to_pandas()` and then sort by `id` before serializing.\n- Make sure the output directory exists before writing (`os.makedirs(\"/workspace/output\", exist_ok=True)`).\n\n## Acceptance Criteria\n- Project path: /workspace\n- Ensure the script is executed and the output artifact exists.\n- Log/output file: /workspace/output/notes_after.json\n- The output file MUST be a JSON array of exactly 8 objects, each with keys `id` (int), `author` (string), and `body` (string), sorted by `id` ascending.\n- The row with `id = 2` MUST have `body` equal exactly to the 8-character string `I'm good`.\n- The row with `id = 4` MUST have `body` equal exactly to the 11-character string `It's a test`.\n- The row with `id = 6` MUST have `author` equal exactly to the 7-character string `O'Brien`.\n- The other rows (`id` in {1, 3, 5, 7, 8}) MUST retain their original seeded `author` and `body` values.\n- The LanceDB table `notes` at `LANCEDB_URI` MUST also reflect these same three updates (the JSON output and the table must agree).\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"-gEhuDvWtmBekwstCmqZD\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/lancedb-benchmark/_next/static/chunks/62e71ca786b4fc97.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/lancedb-benchmark/_next/static/chunks/babff0e7418ab052.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/lancedb-benchmark/_next/static/chunks/3ecbb78a8ff87549.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"en\",\"suppressHydrationWarning\":true,\"children\":[\"$\",\"body\",null,{\"className\":\"inter_5972bc34-module__OU16Qa__className antialiased\",\"children\":[\"$\",\"$L2\",null,{\"children\":[\"$\",\"$L3\",null,{\"defaultTheme\":\"dark\",\"children\":[[\"$\",\"div\",null,{\"className\":\"fixed right-4 top-6 z-50 sm:top-8\",\"children\":[\"$\",\"$L4\",null,{}]}],[\"$\",\"$L5\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\"

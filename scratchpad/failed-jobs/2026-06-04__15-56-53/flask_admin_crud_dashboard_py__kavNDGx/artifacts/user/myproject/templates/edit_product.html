{% extends "base.html" %}
{% block title %}Edit Product – {{ product.id }}{% endblock %}
{% block content %}
<h1>Edit Product: {{ product.id }}</h1>
<form method="POST" action="{{ url_for('product_update', prod_id=product.id) }}">
  <div class="form-group">
    <label>ID</label>
    <input type="text" value="{{ product.id }}" disabled>
  </div>
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ product.name }}" required>
  </div>
  <div class="form-group">
    <label for="category">Category</label>
    <input type="text" id="category" name="category" value="{{ product.category }}" required>
  </div>
  <div class="form-group">
    <label for="price">Price</label>
    <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price }}" required>
  </div>
  <button type="submit" class="btn btn-submit">Save Changes</button>
  <a href="{{ url_for('index') }}" style="margin-left:1rem;">Cancel</a>
</form>
{% endblock %}

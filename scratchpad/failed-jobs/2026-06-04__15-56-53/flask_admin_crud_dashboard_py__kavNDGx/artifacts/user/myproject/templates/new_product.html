{% extends "base.html" %}
{% block title %}New Product{% endblock %}
{% block content %}
<h1>Create New Product</h1>
<form method="POST" action="{{ url_for('product_create') }}">
  <div class="form-group">
    <label for="id">ID</label>
    <input type="text" id="id" name="id" required placeholder="e.g. prod-006">
  </div>
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Product name">
  </div>
  <div class="form-group">
    <label for="category">Category</label>
    <input type="text" id="category" name="category" required placeholder="e.g. electronics">
  </div>
  <div class="form-group">
    <label for="price">Price</label>
    <input type="number" id="price" name="price" step="0.01" min="0" required placeholder="0.00">
  </div>
  <button type="submit" class="btn btn-submit">Create Product</button>
  <a href="{{ url_for('index') }}" style="margin-left:1rem;">Cancel</a>
</form>
{% endblock %}

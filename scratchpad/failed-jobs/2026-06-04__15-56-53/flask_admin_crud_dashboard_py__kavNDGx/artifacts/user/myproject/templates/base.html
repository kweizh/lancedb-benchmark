<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Products Admin{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { margin-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
    th { background: #f0f0f0; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn { display: inline-block; padding: 0.3rem 0.8rem; border: none;
           border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-edit  { background: #0066cc; color: #fff; }
    .btn-delete { background: #cc3300; color: #fff; }
    .btn-submit { background: #009933; color: #fff; padding: 0.5rem 1.2rem; font-size: 1rem; }
    form.inline { display: inline; }
    label { display: block; margin: 0.6rem 0 0.2rem; font-weight: bold; }
    input[type=text], input[type=number] {
      padding: 0.4rem 0.6rem; font-size: 1rem; width: 300px; border: 1px solid #aaa; border-radius: 4px;
    }
    .form-group { margin-bottom: 1rem; }
  </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>

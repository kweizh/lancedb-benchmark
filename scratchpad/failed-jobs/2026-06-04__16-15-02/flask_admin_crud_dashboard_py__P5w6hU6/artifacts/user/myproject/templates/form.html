<!DOCTYPE html>
<html>
<head><title>{{ product.id if product else 'New Product' }}</title></head>
<body>
  <h1>{{ 'Edit Product' if product else 'Create Product' }}</h1>
  <form action="{{ action }}" method="post">
    {% if not product %}
    <label>ID: <input type="text" name="id" required></label><br>
    {% endif %}
    <label>Name: <input type="text" name="name" value="{{ product.name if product else '' }}" required></label><br>
    <label>Category: <input type="text" name="category" value="{{ product.category if product else '' }}" required></label><br>
    <label>Price: <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required></label><br>
    <button type="submit">{{ 'Update' if product else 'Create' }}</button>
  </form>
  <p><a href="{{ url_for('index') }}">Back to list</a></p>
</body>
</html>

<!DOCTYPE html>
<html>
<head><title>Products</title></head>
<body>
  <h1>Products</h1>
  <p><a href="{{ url_for('new_product') }}">Create New Product</a></p>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for p in products %}
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.category }}</td>
        <td>{{ p.price }}</td>
        <td>
          <a href="{{ url_for('edit_product', pid=p.id) }}">Edit</a>
          <form action="{{ url_for('delete_product', pid=p.id) }}" method="post" style="display:inline;">
            <button type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>

{% extends "base.html" %}

{% block title %}Add New Product - LanceDB Admin{% endblock %}

{% block content %}
<h2>Add New Product</h2>
<hr>

<form action="/product" method="POST" style="max-width: 600px; margin-top: 20px;">
    <div class="form-group">
        <label for="id">Product ID</label>
        <input type="text" id="id" name="id" required placeholder="e.g. prod-123">
    </div>
    
    <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Acme Widget">
    </div>
    
    <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" required placeholder="e.g. electronics">
    </div>
    
    <div class="form-group">
        <label for="price">Price ($)</label>
        <input type="number" id="price" name="price" required step="0.01" min="0" placeholder="0.00">
    </div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button type="submit" class="btn btn-primary">Create Product</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}

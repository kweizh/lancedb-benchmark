{% extends "base.html" %}

{% block title %}Edit Product - LanceDB Admin{% endblock %}

{% block content %}
<h2>Edit Product: {{ product.id }}</h2>
<hr>

<form action="/product/{{ product.id }}" method="POST" style="max-width: 600px; margin-top: 20px;">
    <div class="form-group">
        <label for="id">Product ID (Read-only)</label>
        <input type="text" id="id" name="id" value="{{ product.id }}" readonly style="background-color: #e9ecef; cursor: not-allowed;">
    </div>
    
    <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required>
    </div>
    
    <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" value="{{ product.category }}" required>
    </div>
    
    <div class="form-group">
        <label for="price">Price ($)</label>
        <input type="number" id="price" name="price" value="{{ product.price }}" required step="0.01" min="0">
    </div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
